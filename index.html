<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrootMoney Bot | Forex Wealth Empire</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#050505;
  color:#fff;
  overflow-x:hidden;
}

/* CHART BACKGROUND */
#chartBg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  opacity:0.15;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  position:relative;
  z-index:2;
}

.logo{
  font-family:'Orbitron';
  font-weight:900;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
  position:relative;
  z-index:2;
}

/* ROBOT EYE */
.robot-eye{
  margin:40px auto;
  width:140px;
  height:140px;
  border-radius:50%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #ff1f1f;
}

.eye{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#ff1f1f;
  box-shadow:0 0 20px red;
  animation:move 3s infinite;
}

@keyframes move{
  0%{transform:translate(0,0)}
  50%{transform:translate(20px,-10px)}
  100%{transform:translate(0,0)}
}

/* BOT CARDS */
.bot-container{
  display:flex;
  overflow:hidden;
}

.bot{
  min-width:100%;
  padding:40px;
  text-align:center;
}

/* BUTTON */
.btn{
  background:red;
  padding:12px 20px;
  border:none;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* POPUPS */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box{
  background:#111;
  padding:30px;
  text-align:center;
}

</style>
</head>

<body>

<canvas id="chartBg"></canvas>

<header>
  <div class="logo">GROOTMONEY</div>
</header>

<section class="hero">
  <h1>Choose Your Trading Weapon</h1>

  <div class="robot-eye">
    <div class="eye"></div>
  </div>

</section>

<section class="bot-container" id="slider">

  <div class="bot">
    <h2>Broker Killer 5.1</h2>
    <p>Available Now</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="bot">
    <h2>Broker Destroyer 6.1</h2>
    <p>Coming in 30 Days</p>
  </div>

  <div class="bot">
    <h2>Mission Gun 5.5</h2>
    <p>Fast Sculpting Bot</p>
  </div>

</section>

<!-- POPUP 1 -->
<div class="popup" id="popup1">
  <div class="popup-box">
    <h2>Bot Collection Updated</h2>
    <button onclick="closePopup()">Enter</button>
  </div>
</div>

<!-- POPUP 2 -->
<div class="popup" id="popup2" style="display:none;">
  <div class="popup-box">
    <h2>Mission Gun 5.5 Loading</h2>
    <button onclick="closePopup2()">Close</button>
  </div>
</div>

<script>

/* CHART BACKGROUND */
const canvas = document.getElementById("chartBg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  ctx.moveTo(0,canvas.height/2);

  for(let i=0;i<canvas.width;i+=20){
    let y = canvas.height/2 + Math.random()*100-50;
    ctx.lineTo(i,y);
  }

  ctx.strokeStyle="red";
  ctx.stroke();
}

setInterval(draw,1500);

/* POPUPS */
function closePopup(){
  document.getElementById("popup1").style.display="none";
  document.getElementById("popup2").style.display="flex";
}

function closePopup2(){
  document.getElementById("popup2").style.display="none";
}

</script>

</body>
</html>
