<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrootMoney System Boot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  font-family:'Orbitron',sans-serif;
  color:#fff;
  overflow:hidden;
}

/* GRID */
.grid{
  position:absolute;
  width:100%;
  height:100%;
  background:
    linear-gradient(rgba(255,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,0,0.05) 1px, transparent 1px);
  background-size:40px 40px;
}

/* ROBOT CORE */
.core{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#ff0000,transparent);
  box-shadow:0 0 80px red;
  animation:pulse 2s infinite;
}

.eye{
  width:40px;
  height:40px;
  background:red;
  border-radius:50%;
  margin:auto;
  margin-top:70px;
  box-shadow:0 0 30px red;
  animation:scan 3s infinite;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1)}
  50%{transform:translate(-50%,-50%) scale(1.2)}
  100%{transform:translate(-50%,-50%) scale(1)}
}

@keyframes scan{
  0%{transform:translateX(0)}
  50%{transform:translateX(20px)}
  100%{transform:translateX(0)}
}

/* TERMINAL */
.terminal{
  position:absolute;
  bottom:20%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  max-width:600px;
  background:#050505;
  border:1px solid red;
  padding:20px;
  font-size:12px;
  color:#ff2b2b;
  box-shadow:0 0 20px red;
}

/* LOADER */
.loader{
  margin-top:10px;
  height:4px;
  background:#111;
  overflow:hidden;
}

.loader span{
  display:block;
  height:100%;
  width:40%;
  background:red;
  animation:load 1s infinite;
}

@keyframes load{
  0%{margin-left:-40%}
  100%{margin-left:100%}
}

/* WARNING */
.warning{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:red;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1}
  50%{opacity:0}
  100%{opacity:1}
}

/* COUNTDOWN */
.count{
  font-size:28px;
  margin-top:10px;
}

canvas{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0.2;
}

</style>
</head>

<body>

<div class="grid"></div>

<canvas id="chart"></canvas>

<div class="warning">
⚠️ HIGH FREQUENCY SYSTEM DETECTED • BROKER RISK ACTIVE ⚠️
</div>

<div class="core">
  <div class="eye"></div>
</div>

<div class="terminal" id="terminal">
> Initializing GrootMoney Engine...<br>
</div>

<div class="count" id="count"></div>

<script>

/* TERMINAL TEXT */
const lines = [
"> Connecting to market...",
"> Loading candle pressure engine...",
"> Activating Mission Gun system...",
"> Checking broker stability...",
"> WARNING: High win-rate detected...",
"> Final calibration..."
];

let i = 0;

function typeLine(){
  if(i < lines.length){
    document.getElementById("terminal").innerHTML += lines[i] + "<br>";
    i++;
    setTimeout(typeLine, 1000);
  }
}
typeLine();

/* COUNTDOWN */
let time = 5;
function countdown(){
  document.getElementById("count").innerText = "ENTERING SYSTEM IN " + time;
  time--;

  if(time < 0){
    window.location.href = "https://skosana1998.github.io/grootmoney-bot-site/";
  } else {
    setTimeout(countdown,1000);
  }
}
setTimeout(countdown,4000);

/* CANDLE ANIMATION */
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let x=0;x<canvas.width;x+=20){
    let open = Math.random()*canvas.height;
    let close = open + (Math.random()*100 - 50);

    ctx.strokeStyle="red";
    ctx.beginPath();
    ctx.moveTo(x, open);
    ctx.lineTo(x, close);
    ctx.stroke();
  }
}
setInterval(draw,800);

</script>

</body>
</html>
