<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrootMoney | Trading Bots</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== ROOT ===== */
:root{
  --bg:#050505;
  --gold:#d4af37;
  --text:#fff;
  --soft:#aaa;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
}

/* ===== HEADER ===== */
header{
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
}

.logo{
  font-family:'Orbitron';
  color:var(--gold);
  font-weight:900;
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:80px 20px;
}

.hero h1{
  font-family:'Orbitron';
  text-shadow:0 0 20px rgba(212,175,55,0.3);
}

.hero p{
  color:var(--soft);
}

/* ===== BUTTONS ===== */
.btn{
  padding:12px 22px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  margin:5px;
}

.btn-primary{
  background:linear-gradient(135deg,#d4af37,#8c6b1f);
  color:#000;
}

.btn-outline{
  border:1px solid rgba(212,175,55,0.4);
  color:var(--gold);
  background:none;
}

/* ===== BOTS ===== */
.bots{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:40px;
}

.card{
  width:300px;
  padding:25px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  border:1px solid rgba(212,175,55,0.4);
  box-shadow:0 0 30px rgba(212,175,55,0.2);
  transform:translateY(-5px);
}

.card h2{
  font-family:'Orbitron';
}

.tag{
  color:var(--gold);
  font-size:12px;
}

.coming{
  color:#888;
}

/* ===== TICKER ===== */
.ticker{
  color:var(--gold);
  text-align:center;
  padding:10px;
  border-top:1px solid #111;
  border-bottom:1px solid #111;
}

/* ===== LIVE SALE ===== */
#liveSale{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#0c0c0c;
  border:1px solid rgba(212,175,55,0.4);
  padding:12px;
  border-radius:10px;
  font-size:12px;
  display:none;
}

</style>
</head>

<body>

<header>
  <div class="logo">GROOTMONEY</div>
</header>

<section class="hero">
  <h1>Premium Trading Bots</h1>
  <p>Advanced MT5 systems built for precision and execution</p>

  <button class="btn btn-primary" onclick="buyNow()">Buy Now</button>
  <button class="btn btn-outline" onclick="openWhatsApp()">WhatsApp Support</button>

  <div id="countdown"></div>
  <div id="users"></div>
</section>

<div class="ticker">
GROOTMONEY • SMART MONEY CONCEPT • HIGH PERFORMANCE EXECUTION
</div>
