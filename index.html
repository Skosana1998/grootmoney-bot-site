<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance | GrootMoney</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#050505;
  font-family:'Inter',sans-serif;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

/* BACKGROUND CHART */
canvas{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0.15;
}

/* CENTER BOX */
.container{
  position:relative;
  z-index:2;
  text-align:center;
  padding:40px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,0,0,0.2);
  border-radius:15px;
  box-shadow:0 0 40px rgba(255,0,0,0.15);
  max-width:400px;
}

/* LOGO */
.logo{
  font-family:'Orbitron';
  font-size:22px;
  font-weight:800;
  margin-bottom:20px;
}

/* STATUS */
.status{
  color:#ff2b2b;
  font-weight:600;
  margin-bottom:10px;
}

/* TEXT */
.desc{
  font-size:14px;
  color:#ccc;
}

/* LOADER */
.loader{
  margin:30px auto;
  width:200px;
  height:5px;
  background:#111;
  overflow:hidden;
  border-radius:10px;
}

.loader span{
  display:block;
  height:100%;
  width:40%;
  background:#ff1f1f;
  animation:load 1.5s infinite;
}

@keyframes load{
  0%{margin-left:-40%}
  100%{margin-left:100%}
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:11px;
  color:#666;
}

/* FLOATING RED LIGHT */
.glow{
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(255,0,0,0.2), transparent);
  animation:pulse 4s infinite;
  z-index:0;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.4)}
  100%{transform:scale(1)}
}

</style>
</head>

<body>

<canvas id="chart"></canvas>
<div class="glow"></div>

<div class="container">

  <div class="logo">GROOTMONEY</div>

  <div class="status">WEBSITE UNDER MAINTENANCE</div>

  <div class="desc">
    We are currently upgrading our trading systems and improving performance.
    <br><br>
    Please check back shortly.
  </div>

  <div class="loader"><span></span></div>

  <div class="footer">
    Powered by ForexWealthEmpire (Pty)Ltd
  </div>

</div>

<script>

/* CLEAN FOREX LINE BACKGROUND */
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.moveTo(0,canvas.height/2);

  for(let i=0;i<canvas.width;i+=20){
    let y = canvas.height/2 + Math.random()*80 - 40;
    ctx.lineTo(i,y);
  }

  ctx.strokeStyle="#ff1f1f";
  ctx.shadowColor="#ff1f1f";
  ctx.shadowBlur=10;
  ctx.stroke();
}

setInterval(draw,2000);

</script>

</body>
</html>
